<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="40%" style="stop-color:#98d4ee"/>
      <stop offset="60%" style="stop-color:#6ab04c"/>
      <stop offset="100%" style="stop-color:#27ae60"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>
  <!-- mountains -->
  <polygon points="0,280 150,180 300,250 400,160 550,230 700,170 800,220 800,450 0,450" fill="#2d5016" opacity="0.3"/>
  <polygon points="0,320 200,240 350,290 500,220 650,270 800,240 800,450 0,450" fill="#27ae60" opacity="0.5"/>
  <!-- ground -->
  <rect x="0" y="350" width="800" height="100" fill="#1a7a3a" opacity="0.4"/>
  <!-- content -->
  <rect x="40" y="30" width="720" height="380" rx="20" fill="white" opacity="0.92"/>
  <text x="80" y="85" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#0693e3" letter-spacing="3" font-weight="bold">TAIKEN EVENT</text>
  <text x="80" y="140" font-family="Helvetica, Arial, sans-serif" font-size="40" fill="#1a2d50" font-weight="bold">春の乗馬体験</text>
  <text x="80" y="190" font-family="Helvetica, Arial, sans-serif" font-size="40" fill="#1a2d50" font-weight="bold">in 別海 🐴</text>
  <line x1="80" y1="210" x2="220" y2="210" stroke="#0693e3" stroke-width="3"/>
  <text x="80" y="250" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#666">初心者OK・インストラクター付き</text>
  <text x="80" y="280" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#666">北海道の大自然で馬と触れ合おう</text>
  <!-- price tag -->
  <rect x="520" y="100" width="200" height="70" rx="12" fill="#0693e3"/>
  <text x="545" y="135" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="white" opacity="0.8">参加費</text>
  <text x="545" y="160" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="white" font-weight="bold">¥5,000/人</text>
  <!-- details -->
  <text x="80" y="330" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#0693e3">📅</text>
  <text x="105" y="330" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#333">4/5(土) 9:00 集合</text>
  <text x="80" y="365" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#0693e3">📍</text>
  <text x="105" y="365" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#333">別海町 ○○牧場</text>
  <text x="350" y="330" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#0693e3">⏱</text>
  <text x="375" y="330" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#333">約3時間（移動含む）</text>
  <!-- milk badge -->
  <rect x="560" y="340" width="160" height="40" rx="20" fill="#00d084"/>
  <text x="590" y="366" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="white" font-weight="bold">milk nomikai</text>
</svg>
