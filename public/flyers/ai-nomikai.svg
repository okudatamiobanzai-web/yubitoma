<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2d50"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg1)"/>
  <!-- decorative circles -->
  <circle cx="650" cy="80" r="120" fill="#00d084" opacity="0.15"/>
  <circle cx="100" cy="380" r="80" fill="#0693e3" opacity="0.12"/>
  <circle cx="720" cy="350" r="60" fill="#00d084" opacity="0.1"/>
  <!-- content -->
  <text x="60" y="80" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#00d084" letter-spacing="3">NOMIKAI EVENT</text>
  <text x="60" y="140" font-family="Helvetica, Arial, sans-serif" font-size="42" fill="white" font-weight="bold">AI活用について</text>
  <text x="60" y="195" font-family="Helvetica, Arial, sans-serif" font-size="42" fill="white" font-weight="bold">ゆるく語る会</text>
  <line x1="60" y1="220" x2="200" y2="220" stroke="#00d084" stroke-width="3"/>
  <text x="60" y="270" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#8899bb">中標津でAIを使っている人、興味がある人</text>
  <text x="60" y="295" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#8899bb">初心者大歓迎！気軽にご参加ください</text>
  <!-- details -->
  <rect x="60" y="330" width="320" height="90" rx="12" fill="white" opacity="0.08"/>
  <text x="85" y="365" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#00d084">📅</text>
  <text x="110" y="365" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="white">3/22(日) 19:00〜</text>
  <text x="85" y="400" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#00d084">📍</text>
  <text x="110" y="400" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="white">居酒屋 なかしべつ</text>
  <!-- milk badge -->
  <rect x="620" y="380" width="140" height="40" rx="20" fill="#00d084"/>
  <text x="650" y="406" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="white" font-weight="bold">milk nomikai</text>
